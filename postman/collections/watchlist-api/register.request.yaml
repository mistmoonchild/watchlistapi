$kind: http-request
method: POST
url: '{{baseUrl}}/api/register'
order: 1000
headers:
  - key: 'Content-Type'
    value: 'application/json'
  - key: 'Accept'
    value: 'application/json'
body:
  type: json
  content: |-
    {
      "name": "Test User",
      "email": "{{testEmail}}",
      "password": "password123"
    }
